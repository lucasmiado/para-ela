<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uma surpresa para você...</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background-color: #1e293b;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 1px solid #334155;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #38bdf8;
        }

        p {
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 20px;
            color: #cbd5e1;
        }

        .img-container {
            width: 100%;
            max-height: 280px;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
            background-color: #334155;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .img-container img, .img-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        button {
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 14px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        button:active {
            transform: scale(0.98);
        }

        button.secondary {
            background-color: #334155;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="card" id="game-card">
        </div>

    <script>
        const fotos = {
            inicio: "https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=500", 
            sorriso: "sorriso.jpeg",
            doguinhos: "WhatsApp Image 2026-06-24 at 02.42.17.jpeg",
            dogErro: "WhatsApp Image 2026-06-24 at 03.34.31.jpeg", 
            declaracao: "camisa preta.jpeg",
            finalGato: "gato_final.jpeg",
            videoFinal: "ramm.mp4" 
        };

        const fases = {
            inicio: {
                titulo: "Compilando arquivos...",
                texto: "Oi! Eu sei que o mundo da tecnologia é cheio de códigos complicados, mas decidi criar um algoritmo simples para te dizer uma coisa importante. Pronta para rodar esse script?",
                imagem: fotos.inicio,
                botoes: [
                    { texto: "Executar script (Sim)", proxima: "pergunta" }
                ]
            },
            pergunta: {
                titulo: "Análise de Sistema",
                texto: "Seu sorriso foi detectado no meu banco de dados recente e causou um efeito inesperado. Qual o diagnóstico atual do seu lado?",
                imagem: fotos.sorriso,
                botoes: [
                    { texto: "Também adoro conversar com você!", proxima: "doguinhos" },
                    { texto: "Acho que esse sistema tá com bug... (Rir)", proxima: "bug" }
                ]
            },
            bug: {
                titulo: "Erro 404: Sentimento Encontrado",
                texto: "Não é bug, é uma funcionalidade nova! Só queria um pretexto interativo para te lembrar que adoro o seu jeito e o tempo que passamos conversando.",
                imagem: fotos.dogErro,
                botoes: [
                    { texto: "Continuar lendo...", proxima: "doguinhos" }
                ]
            },
            doguinhos: {
                titulo: "Aviso de Segurança: Excesso de Fofura",
                texto: "E o meu sistema quase entra em pane com esse bônus aqui... Sem contar os seus doguinhos que adoro ver todos os dias, o Marley (espero ter escrito certo kkk) e a Zoe! É muita fofura para um banco de dados só.",
                imagem: fotos.doguinhos,
                botoes: [
                    { texto: "Avançar para o resultado final", proxima: "declaracao" }
                ]
            },
            declaracao: {
                titulo: "Resultado da Execução",
                texto: "Sem linhas de código complexas ou joguinhos afinal não estamos no lol... Eu só queria te dizer, de um jeito diferente, que você tem tido um espaço muito especial por aqui. Adoro te conhecer cada dia mais e mal posso esperar pela próxima conversa.",
                imagem: fotos.declaracao,
                botoes: [
                    { texto: "Finalizar processo", proxima: "fim" }
                ]
            },
            fim: {
                titulo: "Processo Concluído com Sucesso",
                texto: "Obrigado por rodar o meu programa até o final eu Lucas Santiago agradeço. Depois me fala oque achou no zap se não tiver travado com essa surpresa! Mais do que \"JUSTO\" RS",
                imagem: fotos.finalGato,
                isVideo: false,
                botoes: [
                    { texto: "Assistir Encerramento Especial 🎬", proxima: "video_fase" }
                ]
            },
            video_fase: {
                titulo: "Fim do Script",
                texto: "Até a nossa próxima linha de código! 😉",
                imagem: fotos.videoFinal,
                isVideo: true,
                botoes: [] // Sem botões externos, o fluxo encerra de forma limpa no vídeo
            }
        };

        function carregarFase(nomeFase) {
            const container = document.getElementById('game-card');
            const dados = fases[nomeFase];
            
            let htmlBotoes = '';
            dados.botoes.forEach((btn, index) => {
                const classe = index > 0 ? 'secondary' : '';
                htmlBotoes += `<button class="${classe}" onclick="carregarFase('${btn.proxima}')">${btn.texto}</button>`;
            });

            let htmlMidia = '';
            if (dados.imagem) {
                if (dados.isVideo) {
                    // Configurado para tocar automático no celular (com controls para se ela quiser pausar)
                    htmlMidia = `<div class="img-container"><video src="${dados.imagem}" autoplay loop playsinline controls></video></div>`;
                } else {
                    htmlMidia = `<div class="img-container"><img src="${dados.imagem}" alt="Foto"></div>`;
                }
            }

            container.innerHTML = `
                <h1>${dados.titulo}</h1>
                ${htmlMidia}
                <p>${dados.texto}</p>
                <div class="btn-container">
                    ${htmlBotoes}
                </div>
            `;
        }

        carregarFase('inicio');
    </script>
</body>
</html>
